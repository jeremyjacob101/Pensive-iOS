name: Pensive
options:
  deploymentTarget:
    iOS: "17.0"

configs:
  Debug: debug
  Staging: release
  Release: release

settings:
  base:
    PRODUCT_NAME: Pensive
    PRODUCT_BUNDLE_IDENTIFIER: com.pensive.app
    CODE_SIGN_STYLE: Automatic
    TARGETED_DEVICE_FAMILY: "1,2"
    GENERATE_INFOPLIST_FILE: YES
    SUPPORTS_MACCATALYST: NO
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0.0

configFiles:
  Debug: Config/Debug.xcconfig
  Staging: Config/Staging.xcconfig
  Release: Config/Release.xcconfig

targets:
  Pensive:
    type: application
    platform: iOS
    sources:
      - path: Pensive
    settings:
      base:
        PRODUCT_MODULE_NAME: Pensive
        SWIFT_EMIT_LOC_STRINGS: YES
        INFOPLIST_FILE: Pensive/Resources/Info.plist
    preBuildScripts: []
    dependencies: []

  PensiveTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PensiveTests
    settings:
      base:
        PRODUCT_MODULE_NAME: PensiveTests
    dependencies:
      - target: Pensive

  PensiveUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: PensiveUITests
    settings:
      base:
        PRODUCT_MODULE_NAME: PensiveUITests
    dependencies:
      - target: Pensive

schemes:
  Pensive:
    build:
      targets:
        Pensive: all
        PensiveTests: [test]
        PensiveUITests: [test]
    test:
      config: Debug
      targets:
        - name: PensiveTests
        - name: PensiveUITests
    run:
      config: Debug
    archive:
      config: Release
